<!DOCTYPE html>
<html lang="en">
<head>
  <!-- AI GENERATEDDDDDD -->
<meta charset="UTF-8">
<title>Side Scroller Tank Shooter</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===================== PLAYER =====================
const player = {
  x: 80,
  y: canvas.height / 2,
  width: 40,
  height: 30,
  speed: 5,
  dy: 0
};

// ===================== INPUT =====================
const keys = {};

window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// ===================== BULLETS =====================
let bullets = [];

function shoot() {
  bullets.push({
    x: player.x + player.width,
    y: player.y + player.height / 2 - 3,
    width: 10,
    height: 6,
    speed: 8
  });
}

// ===================== ENEMIES =====================
let enemies = [];

function spawnEnemy() {
  enemies.push({
    x: canvas.width,
    y: Math.random() * (canvas.height - 30),
    width: 30,
    height: 30,
    speed: 3
  });
}

// ===================== WALLS =====================
let walls = [];

function spawnWall() {
  const gapY = Math.random() * (canvas.height - 200) + 50;

  // Top wall
  walls.push({
    x: canvas.width,
    y: 0,
    width: 50,
    height: gapY - 50,
    speed: 3
  });

  // Bottom wall
  walls.push({
    x: canvas.width,
    y: gapY + 100,
    width: 50,
    height: canvas.height - gapY,
    speed: 3
  });
}

// ===================== COLLISION =====================
function isColliding(a, b) {
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

// ===================== GAME LOOP =====================
let gameOver = false;

function update() {
  if (gameOver) return;

  // Movement
  if (keys["ArrowUp"]) player.y -= player.speed;
  if (keys["ArrowDown"]) player.y += player.speed;

  // Shoot
  if (keys[" "] && Math.random() < 0.2) shoot();

  // Keep player in bounds
  player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

  // Update bullets
  bullets.forEach(b => b.x += b.speed);
  bullets = bullets.filter(b => b.x < canvas.width);

  // Update enemies
  enemies.forEach(e => e.x -= e.speed);
  enemies = enemies.filter(e => e.x + e.width > 0);

  // Update walls
  walls.forEach(w => w.x -= w.speed);
  walls = walls.filter(w => w.x + w.width > 0);

  // Bullet vs enemy
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if (isColliding(b, e)) {
        bullets.splice(bi, 1);
        enemies.splice(ei, 1);
      }
    });
  });

  // Player vs enemy
  enemies.forEach(e => {
    if (isColliding(player, e)) gameOver = true;
  });

  // Player vs wall
  walls.forEach(w => {
    if (isColliding(player, w)) gameOver = true;
  });
}

// ===================== DRAW =====================
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Player
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // Gun barrel
  ctx.fillRect(player.x + player.width, player.y + player.height / 2 - 2, 15, 4);

  // Bullets
  ctx.fillStyle = "yellow";
  bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

  // Enemies
  ctx.fillStyle = "red";
  enemies.forEach(e => ctx.fillRect(e.x, e.y, e.width, e.height));

  // Walls
  ctx.fillStyle = "gray";
  walls.forEach(w => ctx.fillRect(w.x, w.y, w.width, w.height));

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("Game Over", canvas.width / 2 - 100, canvas.height / 2);
  }
}

// ===================== SPAWN TIMERS =====================
setInterval(spawnEnemy, 1200);
setInterval(spawnWall, 3000);

// ===================== LOOP =====================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
