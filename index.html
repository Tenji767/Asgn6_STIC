<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dash Attack Survival</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: black;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // ================= PLAYER =================
      const player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        size: 20,
        speed: 4,
        dx: 0,
        dy: 0,
        dashCooldown: 0,
        attackCooldown: 0,
      };

      // ================= INPUT =================
      const keys = {};

      window.addEventListener(
        "keydown",
        (e) => (keys[e.key.toLowerCase()] = true),
      );
      window.addEventListener(
        "keyup",
        (e) => (keys[e.key.toLowerCase()] = false),
      );

      // ================= ENEMIES =================
      let enemies = [];

      function spawnEnemy() {
        const edge = Math.floor(Math.random() * 4);
        let x, y;

        if (edge === 0) {
          x = 0;
          y = Math.random() * canvas.height;
        }
        if (edge === 1) {
          x = canvas.width;
          y = Math.random() * canvas.height;
        }
        if (edge === 2) {
          x = Math.random() * canvas.width;
          y = 0;
        }
        if (edge === 3) {
          x = Math.random() * canvas.width;
          y = canvas.height;
        }

        enemies.push({
          x,
          y,
          size: 20,
          speed: 1.5,
        });
      }

      let slashes = [];
      let score = 0;
      let afterimages = [];
      // ================= UTILS =================
      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      // ================= ATTACK =================
      function attack(dirX, dirY) {
        if (player.attackCooldown > 0) return;
        player.attackCooldown = 10;

        const angle = Math.atan2(dirY, dirX);

        slashes.push({
          x: player.x,
          y: player.y,
          angle: angle,
          life: 12,
          maxLife: 12,
          radius: 30,
        });

        const range = 80;

        enemies = enemies.filter((e) => {
          const dx = e.x - player.x;
          const dy = e.y - player.y;
          const dot = dx * dirX + dy * dirY;

          const hit = dot > 0 && Math.hypot(dx, dy) < range;

          if (hit) score += 10;

          return !hit;
        });
      }

      // ================= DASH =================
      function dash() {
        if (player.dashCooldown > 0) return;
        if (player.dx === 0 && player.dy === 0) return;

        player.dashCooldown = 10;

        const dashDist = 120;
        const norm = Math.hypot(player.dx, player.dy);

        const dirX = player.dx / norm;
        const dirY = player.dy / norm;

        const oldX = player.x;
        const oldY = player.y;

        player.x += dirX * dashDist;
        player.y += dirY * dashDist;

        for (let i = 0; i < 6; i++) {
          afterimages.push({
            x: oldX + dirX * (i * 20),
            y: oldY + dirY * (i * 20),
            life: 15,
            maxLife: 15,
          });
        }

        // Kill enemies along path
        enemies = enemies.filter((e) => {
          const t = (e.x - oldX) * dirX + (e.y - oldY) * dirY;
          if (t < 0 || t > dashDist) return true;

          const closestX = oldX + dirX * t;
          const closestY = oldY + dirY * t;

          const dist = Math.hypot(e.x - closestX, e.y - closestY);

          if (dist < 25) {
            score += 15; // dash bonus
            return false;
          }

          return true;
        });
        slashes.push({
          x: player.x,
          y: player.y,
          angle: Math.atan2(player.dy, player.dx),
          life: 10,
          maxLife: 10,
          radius: 50,
        });
      }

      // ================= GAME LOOP =================
      let gameOver = false;
      let spawnInterval = null;

      function restart() {
        gameOver = false;
        score = 0;
        enemies = [];
        slashes = [];
        afterimages = [];
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        player.dx = 0;
        player.dy = 0;
        player.dashCooldown = 0;
        player.attackCooldown = 0;
        spawnInterval = setInterval(spawnEnemy, 1000);
      }

      function update() {
        if (gameOver) return;

        // Movement
        player.dx = 0;
        player.dy = 0;

        if (keys["arrowup"]) player.dy = -1;
        if (keys["arrowdown"]) player.dy = 1;
        if (keys["arrowleft"]) player.dx = -1;
        if (keys["arrowright"]) player.dx = 1;

        player.x += player.dx * player.speed;
        player.y += player.dy * player.speed;

        // Bounds
        player.x = Math.max(0, Math.min(canvas.width, player.x));
        player.y = Math.max(0, Math.min(canvas.height, player.y));

        // Attack directions (WASD)
        if (keys["w"]) attack(0, -1);
        if (keys["s"]) attack(0, 1);
        if (keys["a"]) attack(-1, 0);
        if (keys["d"]) attack(1, 0);

        slashes.forEach((s) => {
          s.life--;
          s.radius += 2; // grows outward slightly
        });

        slashes = slashes.filter((s) => s.life > 0);

        // Dash
        if (keys[" "]) {
          dash();
          keys[" "] = false;
        }

        // Cooldowns
        if (player.attackCooldown > 0) player.attackCooldown--;
        if (player.dashCooldown > 0) player.dashCooldown--;

        afterimages.forEach((a) => a.life--);
        afterimages = afterimages.filter((a) => a.life > 0);

        // Enemy movement
        enemies.forEach((e) => {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const dist = Math.hypot(dx, dy);

          e.x += (dx / dist) * e.speed;
          e.y += (dy / dist) * e.speed;

          if (distance(player, e) < player.size) {
            gameOver = true;
            clearInterval(spawnInterval);
          }
        });
      }

      // ================= DRAW =================
      function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        afterimages.forEach((a) => {
          ctx.globalAlpha = (a.life / a.maxLife) * 0.5;

          ctx.fillStyle = "cyan";
          ctx.beginPath();
          ctx.arc(a.x, a.y, player.size, 0, Math.PI * 2);
          ctx.fill();

          ctx.globalAlpha = 1;
        });

        // Player
        ctx.fillStyle = "cyan";
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
        ctx.fill();

        // Enemies
        ctx.fillStyle = "red";
        enemies.forEach((e) => {
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
          ctx.fill();
        });

        slashes.forEach((s) => {
          const progress = 1 - s.life / s.maxLife;

          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.rotate(s.angle);

          // Fade out
          ctx.globalAlpha = s.life / s.maxLife;

          // Glow layer
          ctx.strokeStyle = "rgba(255,255,255,0.2)";
          ctx.lineWidth = 20;
          ctx.beginPath();
          ctx.arc(0, 0, s.radius, -0.8, 0.8);
          ctx.stroke();

          // Main bright slash
          ctx.strokeStyle = "white";
          ctx.lineWidth = 6;
          ctx.beginPath();
          ctx.arc(0, 0, s.radius, -0.6, 0.6);
          ctx.stroke();

          // Sharp inner highlight
          ctx.strokeStyle = "cyan";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, s.radius - 5, -0.5, 0.5);
          ctx.stroke();

          ctx.restore();
        });

        if (!gameOver) {
          ctx.fillStyle = "white";
          ctx.font = "20px Arial";
          ctx.fillText("Score: " + score, 20, 30);
        }

        if (gameOver) {
          ctx.fillStyle = "white";
          ctx.font = "40px Arial";
          ctx.fillText(
            "Game Over",
            canvas.width / 2 - 100,
            canvas.height / 2 - 60,
          );
          ctx.font = "30px Arial";
          ctx.fillText(
            "Score: " + score,
            canvas.width / 2 - 80,
            canvas.height / 2,
          );

          // Draw restart button
          const buttonWidth = 150;
          const buttonHeight = 50;
          const buttonX = canvas.width / 2 - buttonWidth / 2;
          const buttonY = canvas.height / 2 + 80;

          ctx.fillStyle = "rgba(100, 200, 255, 0.7)";
          ctx.fillRect(buttonX, buttonY, buttonWidth, buttonHeight);

          ctx.strokeStyle = "white";
          ctx.lineWidth = 2;
          ctx.strokeRect(buttonX, buttonY, buttonWidth, buttonHeight);

          ctx.fillStyle = "white";
          ctx.font = "24px Arial";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("Restart", canvas.width / 2, buttonY + buttonHeight / 2);
          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
        }
      }

      // ================= CLICK HANDLER =================
      canvas.addEventListener("click", (e) => {
        if (gameOver) {
          const rect = canvas.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const mouseY = e.clientY - rect.top;

          const buttonWidth = 150;
          const buttonHeight = 50;
          const buttonX = canvas.width / 2 - buttonWidth / 2;
          const buttonY = canvas.height / 2 + 80;

          if (
            mouseX > buttonX &&
            mouseX < buttonX + buttonWidth &&
            mouseY > buttonY &&
            mouseY < buttonY + buttonHeight
          ) {
            restart();
          }
        }
      });

      // ================= SPAWN =================
      spawnInterval = setInterval(spawnEnemy, 1000);

      // ================= LOOP =================
      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      loop();
    </script>
  </body>
</html>
